# Example configuration for filament_manager
# Save this to your printer config file

[filament_manager]
# Global settings
# Timeouts (in seconds)
default_timeout: 30

# Purge settings (performed after successful load)
purge_count: 3
purge_length: 5
purge_speed: 5
purge_interval: 2.0

# Load/Unload speeds (mm/s)
load_speed: 10
unload_speed: 10

# Travel speed (mm/s)
travel_speed: 100

# Save filament state to variables file (persists across restarts)
save_variables: True

# Per-extruder settings (optional - will use globals if not specified)
# Uncomment and modify as needed:

# [filament_manager extruder]
# sensors: my_switch_sensor, my_motion_sensor, cutter
# load_timeout: 20
# unload_timeout: 15
# load_speed: 8
# unload_speed: 12
# purge_count: 5
# purge_length: 3
# purge_speed: 3
# save_variables: True
